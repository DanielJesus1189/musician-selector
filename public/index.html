<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Musician Selector</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Select Musicians</h1>
  
  <div style="margin-bottom: 1rem;">
    <input 
      type="text" 
      id="searchInput" 
      placeholder="Search musicians..."
      style="width: 100%; padding: 0.5rem; font-size: 1rem; border: 1px solid #ccc; border-radius: 4px;"
    />
  </div>

  <div id="list"></div>

  <div class="counts">
    <h2>Instruments</h2>
    <ul id="instrumentCounts"></ul>
    
    <h2>Vocal Ranges</h2>
    <ul id="vocalCounts"></ul>
  </div>

  <script>
    let allMusicians = [];
    // Keep track of selected musician names so selections survive filtering
    const selectedSet = new Set();

    // Load musicians from the API and render a checkbox for each
    async function loadMusicians() {
      const res = await fetch('/api/musicians');
      allMusicians = await res.json();
      // Build quick lookup map for later aggregation
      buildMusicianMap();
      renderMusicians(allMusicians);
    }

    // Render musicians based on filtered list, preserving checked state
    function renderMusicians(musicians) {
      const container = document.getElementById('list');
      container.innerHTML = '';

      musicians.forEach(m => {
        const label = document.createElement('label');

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.dataset.instrument = m.instrument || '';
        cb.dataset.vocal = m.vocalRange;
        // Restore previous selection if present
        if (selectedSet.has(m.name)) {
          cb.checked = true;
        }
        // Update the set whenever a checkbox changes
        cb.addEventListener('change', () => {
          if (cb.checked) {
            selectedSet.add(m.name);
          } else {
            selectedSet.delete(m.name);
          }
          updateCounts();
        });

        label.appendChild(cb);
        label.append(` ${m.name}`);
        container.appendChild(label);
      });
      // After rendering, ensure counts reflect the restored selections
      updateCounts();
    }

    // Filter musicians by name search
    function filterMusicians() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      
      if (searchTerm === '') {
        renderMusicians(allMusicians);
      } else {
        const filtered = allMusicians.filter(m => 
          m.name.toLowerCase().includes(searchTerm)
        );
        renderMusicians(filtered);
      }

      updateCounts();
    }

    // Helper: map musician name to its data for quick lookup
    const musicianByName = {};
    // Populate the map once after loading data
    function buildMusicianMap() {
      allMusicians.forEach(m => {
        musicianByName[m.name] = m;
      });
    }

    // Re‑calculate and display live aggregated counts based on selectedSet
    function updateCounts() {
      const instrMap = {};
      const vocalMap = {};

      selectedSet.forEach(name => {
        const m = musicianByName[name];
        if (!m) return;
        const instr = m.instrument || '';
        const vocal = m.vocalRange;
        if (instr) {
          instrMap[instr] = (instrMap[instr] || 0) + 1;
        }
        vocalMap[vocal] = (vocalMap[vocal] || 0) + 1;
      });

      const instrUl = document.getElementById('instrumentCounts');
      const vocalUl = document.getElementById('vocalCounts');

      instrUl.innerHTML = Object.entries(instrMap)
        .map(([k, v]) => `<li>${v} ${k}${v > 1 ? 's' : ''}</li>`)
        .join('');

      vocalUl.innerHTML = Object.entries(vocalMap)
        .map(([k, v]) => `<li>${v} ${k}${v > 1 ? 's' : ''}</li>`)
        .join('');
    }

    // Attach search listener
    document.getElementById('searchInput').addEventListener('input', filterMusicians);

    // Initialise
    loadMusicians();
  </script>
</body>
</html>
